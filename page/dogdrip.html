<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/control_panel.css" />
  </head>
  <body>
    <div class="ui-card">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: end;
          margin-bottom: 1rem;
        "
      >
        <h1 style="margin-bottom: 0">개드립 Plus+</h1>
        <div class="popup-footer" style="margin-top: 10px; font-size: 11px">
          현재 버전:
          <span id="ext-version" style="font-weight: 700">v 0.0.0</span>
          <a
            id="check-update-link"
            href="https://github.com/z3ro2201/dogdrip-plus"
            target="_blank"
            style="
              display: block;
              margin-top: 4px;
              color: #0284c7;
              text-decoration: none;
            "
          ></a>
        </div>
      </div>
      <a
        id="open-options-link2"
        href="#"
        style="
          font-size: 12.5px;
          color: var(--md-primary);
          text-decoration: none;
          font-weight: 700;
          letter-spacing: -0.3px;
        "
        >🛠️ 차단 내역 조회 및 전체 설정 관리</a
      >
    </div>

    <div class="ui-card">
      <h3>🍪 사이트 환경 설정</h3>

      <div class="ext-setting-row">
        <span class="ext-setting-label">개드립콘 절약모드</span>
        <label class="ext-switch">
          <input type="checkbox" id="toggle-cookie-switch" />
          <span class="ext-slider round"></span>
        </label>
      </div>

      <div class="ext-setting-row">
        <span class="ext-setting-label">색상 반전</span>
        <button id="toggle-invert-btn" class="ui-button">테마 변경</button>
      </div>
    </div>

    <div class="ui-card">
      <h3>👁️ 화면 레이아웃 설정</h3>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <span>공지글 안보기</span>
          <input type="checkbox" id="hide-notice-cb" />
        </label>
        <label class="checkbox-item">
          <span>인기글 안보기</span>
          <input type="checkbox" id="hide-popular-cb" />
        </label>
        <label class="checkbox-item">
          <span>우측 인기글 안보기</span>
          <input type="checkbox" id="hide-sidebar-cb" />
        </label>
        <label class="checkbox-item">
          <span>컴팩트 모드</span>
          <input type="checkbox" id="compact-mode-cb" />
        </label>
        <label class="checkbox-item">
          <span>추천 기능 비활성화 (추천 박스 숨김)</span>
          <input type="checkbox" id="disable-vote-cb" />
        </label>
        <label class="checkbox-item">
          <span>가독성 모드 (폰트·줄간격·자간 최적화)</span>
          <input type="checkbox" id="readability-mode-cb" />
        </label>
        <label class="checkbox-item">
          <span>개드립 도구모음 사용</span>
          <input type="checkbox" id="legacy-toolbar-cb" />
        </label>
      </div>
      <div class="section-group">
        <p class="section-title">본문 넓이 설정 (기본: 960px)</p>
        <div class="input-group">
          <input
            type="text"
            id="content-width-input"
            placeholder="본문 넓이 설정 (기본: 960px)"
            style="font-size: 12.5px"
          />
          <button
            id="apply-width-btn"
            class="ui-button ui-button-primary"
            style="
              padding: 8px 14px;
              border-radius: var(--radius-md);
              font-size: 12.5px;
            "
          >
            적용
          </button>
        </div>
      </div>
    </div>

    <div class="ui-card">
      <h3>🔒 보안 설정</h3>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <span>유튜브 알고리즘 방어 (시청 기록 미저장)</span>
          <input type="checkbox" id="preventYoutubeAlgorithm" />
        </label>
      </div>
    </div>

    <div class="ui-card">
      <h3>🚫 빠른 키워드 차단</h3>

      <div style="display: flex; gap: 4px; margin-bottom: 8px">
        <select
          id="ext-quick-keyword-method"
          style="
            flex: 1;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 12px;
            background: #fff;
            cursor: pointer;
          "
        >
          <option value="includes">포함할 때</option>
          <option value="starts">시작할 때</option>
        </select>

        <select
          id="ext-quick-keyword-target"
          style="
            flex: 1;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 12px;
            background: #fff;
            cursor: pointer;
          "
        >
          <option value="all">전체 구역</option>
          <option value="comments">댓글만</option>
          <option value="posts">제목만</option>
        </select>
      </div>

      <div class="input-group">
        <input
          type="text"
          id="keyword-input"
          placeholder="차단할 키워드 입력"
          style="font-size: 13px"
        />
        <button id="add-keyword-btn" class="ui-button ui-button-dark">
          추가
        </button>
      </div>
    </div>

    <div class="ui-card">
      <h3>🚫 사용자 차단 처리 방식</h3>
      <div class="block-method-container">
        <label class="radio-item">
          <input
            type="radio"
            name="ext-block-method"
            id="block-method-remove"
            value="remove"
            checked
          />
          <span class="radio-mark"></span>
          <span>목록에서 삭제</span>
        </label>
        <label class="radio-item">
          <input
            type="radio"
            name="ext-block-method"
            id="block-method-blind"
            value="blind"
          />
          <span class="radio-mark"></span>
          <span
            >내용을 숨기고 "차단된 사용자의 글/댓글입니다" 블라인드 처리
            (클릭토글, 마우스 오버 열람)</span
          >
        </label>
        <label class="radio-item">
          <input
            type="radio"
            name="ext-block-method"
            id="block-method-badge"
            value="badge"
          />
          <span class="radio-mark"></span>
          <span>글 유지하고 메모 표기</span>
        </label>
      </div>
    </div>

    <div style="margin-top: 16px; text-align: center">
      <a
        id="open-options-link"
        href="#"
        style="
          font-size: 12.5px;
          color: var(--md-primary);
          text-decoration: none;
          font-weight: 700;
          letter-spacing: -0.3px;
        "
        >🛠️ 차단 내역 조회 및 전체 설정 관리</a
      >
    </div>

    <script src="/js/popup.js"></script>
    <script src="/js/global.js"></script>
  </body>
</html>
