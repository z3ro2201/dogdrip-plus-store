<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>개드립 Plus + - 설치를 환영합니다!</title>
    <link rel="stylesheet" href="/css/welcome.css" />
  </head>
  <body>
    <div class="card">
      <h1>🎉 개드립 Plus + 설치 완료!</h1>
      <p>
        프로그램이 성공적으로 설치되었습니다. 간단 제어판을 편리하게 쓰시려면
        고정이 필요합니다.
      </p>

      <div class="pin-guide">
        1. 브라우저 우측 상단의
        <span class="highlight">🧩 퍼즐 조각 아이콘</span>을 클릭합니다.<br />
        2. 리스트에서 [개드립 Plus+] 옆의
        <span class="highlight">📌 고정 핀 버튼</span>을 파랗게 켜주세요! 3.
        Dogdrip++ 사용자는 <span class="highlight">앱의 상세 설정</span>을 클릭
        하여 데이터 복원이관을 진행하시면 됩니다.<br />
      </div>
    </div>
  </body>
</html>
